<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Phone Boxes</title>
<style>
  html, body {
    margin: 0;
    padding: 0;
    height: 100%;
    overflow: hidden;
    font-family: Arial, sans-serif;
    background: #111;
    color: white;
  }

  .container {
    display: flex;
    overflow-x: auto;
    scroll-snap-type: x mandatory;
    height: 100%;
    width: 100%;
  }

  .box {
    flex: 0 0 100%;       /* important: do not shrink, width = 100% of viewport */
    scroll-snap-align: start;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    font-size: 22px;
    border-right: 1px solid #333;
  }

  .icon {
    font-size: 70px;
    margin-bottom: 20px;
  }

  /* Optional: hide scrollbar for nicer look */
  .container::-webkit-scrollbar {
    display: none;
  }
  .name {
  font-size: 26px;
  font-weight: bold;
  margin-bottom: 10px;
  color: white;
}

.feature {
  font-size: 20px;
  margin-bottom: 10px;
  color: white;
}

.description {
  font-size: 16px;
  color: white;
  max-width: 80%;
  text-align: center;
}
</style>
</head>
<body>
<div class="container" id="container"></div>
<script type="module" src="/src/main.ts"></script>
</body>
</html>
